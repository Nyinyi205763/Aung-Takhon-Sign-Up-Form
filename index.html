<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeNest Partner Form - Dynamic</title>
    <style>
        :root {
            --primary-blue: #2c4464;
            --primary-green: #8cc63f;
            --light-bg: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--light-bg); color: #333; padding: 20px; }

        .form-box {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: auto;
            border-top: 6px solid var(--primary-green);
        }

        .form-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        select:focus, input:focus { border-color: var(--primary-green); }

        .submit-btn {
            background: var(--primary-blue);
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .success {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-box">
    <div class="form-title">Partner Registration</div>
    
    <form id="contactForm">
        <div class="form-group">
            <input type="text" id="name" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <input type="tel" id="phone" placeholder="Phone Number" required>
        </div>

        <div class="form-group">
            <label>Interested Brand</label>
            <select id="brand" onchange="updateProducts()" required>
                <option value="">-- Select Brand --</option>
                <option value="ATK">Aung TaKhon</option>
                <option value="NLP">New Life Plastic</option>
                <option value="Spark">Spark</option>
            </select>
        </div>

        <div class="form-group">
            <label>Interested Items</label>
            <select id="items" required>
                <option value="">-- Select Brand First --</option>
            </select>
        </div>

        <div class="form-group">
            <input type="text" id="address" placeholder="Address">
        </div>

        <div class="form-group">
            <textarea id="message" placeholder="Your Message"></textarea>
        </div>

        <button type="submit" class="submit-btn">SUBMIT INQUIRY</button>
        <div class="success" id="successMsg"></div>
    </form>
</div>

<script>
    // Product Data
    const products = {
        "ATK": [
            "NBP1.0-2.45-0H", "NBP1.0-3-0H", "NBP1.0-3-5H", "NBP1.0-3-7H", "NBP1.0-3-8H", 
            "NBP1.0-4-0H", "NBP1.5-4.7-0H", "NBP1.5-4.7-5H", "NBP1.5-4.7-7H", "NBP1.5-4.7-8H", 
            "NBP1.5-6-0H", "NBP1.5-6-5H", "NBP1.5-6-7H", "NBP1.5-6-8H", "NBP2.0-2.45-0H", 
            "NWP2.0-2.45-0H", "NWP2.0-6-0H", "NBP2.0-5.7-0H", "NBP2.0-5.7-5H", "NBP2.0-5.7-7H", 
            "NBP2.0-7-0H", "NBP2.5-6.8-0H", "NBP2.5-6.8-9H", "NBP3.0-4.75-0H", "NBP3.0-4.5-0H", 
            "NBP3.0-9.5-0H", "NBP3.0-12.5-0H", "NWP3.0-10-0H", "NBP4.0-16-0H", "NBP4.0-18-0H", 
            "NSK1-T", "NSK2x1-4W", "NSKSP-FP", "NSKMINI-O", "NSKMINI-Y", "NSK4x2-T", 
            "NSK2x2-Black", "NSK2-TB", "NSK3-TB", "NSK4-GDP", "NSK3-GDP", "NSK2-GDP", 
            "NSK3x1-Black", "NSK3x1.5-Black", "NSK4x2-White", "NSK2-Big", "ATK-PS-500CC", "BC16A-Ba"
        ],
        "NLP": [
            "PP", "LDPE", "NSKSP-Red", "NSKSP-Green", "NSKSP-Yellow"
        ],
        "Spark": [
            "FDP16MM40CM", "FDP16MM30CM", "RDP16MM40CM"
        ]
    };

    function updateProducts() {
        const brandSelect = document.getElementById("brand");
        const itemSelect = document.getElementById("items");
        const selectedBrand = brandSelect.value;

        // Clear previous options
        itemSelect.innerHTML = '<option value="">-- Select Product --</option>';

        if (selectedBrand && products[selectedBrand]) {
            products[selectedBrand].forEach(product => {
                let option = document.createElement("option");
                option.value = product;
                option.text = product;
                itemSelect.appendChild(option);
            });
        } else {
            itemSelect.innerHTML = '<option value="">-- Select Brand First --</option>';
        }
    }

    // Form Submission Logic
    const scriptURL = "YOUR_APPS_SCRIPT_URL";
    const form = document.getElementById("contactForm");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", e => {
        e.preventDefault();
        successMsg.style.display = "block";
        successMsg.innerHTML = "⏳ Sending...";
        
        const data = {
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            brand: document.getElementById("brand").value,
            item: document.getElementById("items").value,
            address: document.getElementById("address").value,
            message: document.getElementById("message").value
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)})
            .then(() => {
                successMsg.style.background = "#d4edda";
                successMsg.innerHTML = "✅ Submitted Successfully!";
                form.reset();
                updateProducts(); // Reset item dropdown
            })
            .catch(error => {
                successMsg.style.background = "#f8d7da";
                successMsg.innerHTML = "❌ Error occurred.";
            });
    });
</script>

</body>
</html>
